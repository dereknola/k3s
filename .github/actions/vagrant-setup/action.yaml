name: 'Setup Vagrant and Libvirt'
description: 'A composite action that installs latest versions of vagrant and libvirt for use on ubuntu based runners'
runs:
  using: 'composite'
  steps:
    - name: Add vagrant to apt-get sources
      shell: bash
      run: |
        curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
        
    - name: apt-get R/W cache
      uses: actions/cache@v4
      id: cache-packages
      # if: github.ref == 'refs/heads/main'
      with:
        path: |
          ${{ runner.temp }}/var/cache/apt
          ${{ runner.temp }}/var/lib/apt
        key: apt-cache-${{ runner.os }}-${{ hashFiles('/etc/apt/sources.list.d/*.list') }}
        restore-keys: |
          apt-cache-${{ runner.os }}-
    # - name: apt-get Read cache
    #   # if: github.ref != 'refs/heads/main'
    #   uses: actions/cache/restore@v4
    #   with:
    #     path: |
    #       /var/cache/apt
    #       /var/lib/apt
    #     key: apt-cache-${{ runner.os }}-${{ hashFiles('/etc/apt/sources.list.d/*.list') }}
    #     restore-keys: |
    #       apt-cache-${{ runner.os }}-

    - name: Restore apt-get cache
      if: steps.cache-packages.outputs.cache-hit == 'true'
      shell: bash
      run: |
        sudo cp -r ${{ runner.temp }}/var/cache/apt /var/cache/apt
        sudo cp -r ${{ runner.temp }}/var/lib/apt /var/lib/apt

    - name: Install vagrant and libvirt
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libvirt-daemon libvirt-daemon-system vagrant=2.4.1-1 ruby-libvirt

    - name: Install vagrant dependencies
      shell: bash
      run: |
        sudo apt-get install -y --no-install-recommends libxslt-dev libxml2-dev libvirt-dev ruby-bundler ruby-dev zlib1g-dev

    # This is a workaround for the libvirt group not being available in the current shell
    # https://github.com/actions/runner-images/issues/7670#issuecomment-1900711711
    - name: Make the libvirt socket rw accessible to everyone
      shell: bash
      run: |
        sudo systemctl enable --now libvirtd
        sudo chmod a+rw /var/run/libvirt/libvirt-sock
    - name: Install vagrant-libvirt plugin
      shell: bash
      run: vagrant plugin install vagrant-libvirt

    - name: Copy apt-get cache for next run
      if: steps.cache-packages.outputs.cache-hit != 'true'
      shell: bash
      run: |
        sudo cp -r /var/cache/apt ${{ runner.temp }}/var/cache/apt 
        sudo cp -r /var/lib/apt ${{ runner.temp }}/var/lib/apt 