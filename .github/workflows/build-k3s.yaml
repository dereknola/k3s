on: 
  workflow_call:
    inputs:
      arch:
        type: string
        description: 'Architecture to build (amd64, arm64, or arm)'
        default: 'amd64'
      os:
        type: string
        description: 'Target OS (linux or windows)'
        default: 'linux'
      upload-image:
        type: boolean
        description: 'Build and upload k3s image (only works on arm64 or amd64)'
        required: false
        default: false
      upload-build:
        type: boolean
        description: 'Upload contents of build/out, used to build the k3s image externally'
        required: false
        default: false
      test-coverage:
        type: boolean
        description: 'Whether to build K3s with -cover for test coverage collection'
        required: false
        default: false
      platforms:
        type: string
        description: 'Buildx platform list. If set, overrides arch/os inputs.'
        required: false
        default: ''

permissions:
  actions: write
  contents: read

jobs:
  build:
    name: Build # DO NOT CHANGE THIS NAME, we rely on it for INSTALL_K3S_PR functionality
    runs-on: ${{ inputs.platforms != '' && (github.repository_owner == 'k3s-io' && 'cncf-ubuntu-16-64-x86' || 'ubuntu-24.04') || (contains(inputs.arch, 'arm') && (github.repository_owner == 'k3s-io' && 'cncf-ubuntu-16-64-arm' || 'ubuntu-24.04-arm') || (github.repository_owner == 'k3s-io' && inputs.arch == 'amd64' && 'cncf-ubuntu-16-64-x86' || 'ubuntu-24.04')) }}
    timeout-minutes: 20
    env:
      BIN_EXT: ${{ inputs.os == 'windows' && '.exe' || '' }}
      ARCH_EXT: ${{ inputs.os == 'windows' && '-windows' || format('-{0}', inputs.arch) }}
      GOOS: ${{ inputs.os }}
    steps:
    - name: Checkout K3s
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    
    - name: Set up Docker
      uses: docker/setup-docker-action@0234bb73ccb40f0c430b795634f9247e2b5c2d23 # v5
      with:
        version: type=image,tag=28
        daemon-config: '{"features":{"containerd-snapshotter":true}}'
        set-host: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Determine Git Version Info
      id: git_vars
      run: |
        source ./scripts/git_version.sh
        {
          echo "git_tag=${GIT_TAG}"
          echo "tree_state=${TREE_STATE}"
          echo "commit=${COMMIT}"
          echo "dirty=${DIRTY}"
        } >> "$GITHUB_OUTPUT"

    - name: Determine build platforms
      id: platforms
      run: |
        if [ -n '${{ inputs.platforms }}' ]; then
          platforms='${{ inputs.platforms }}'
          artifact_name='k3s-all'
        elif [ '${{ inputs.os }}' = 'windows' ]; then
          platforms='windows/amd64'
          artifact_name='k3s-windows'
        elif [ '${{ inputs.arch }}' = 'arm' ]; then
          platforms='linux/arm/v7'
          artifact_name='k3s-arm'
        else
          platforms='linux/${{ inputs.arch }}'
          artifact_name='k3s-${{ inputs.arch }}'
        fi
        {
          echo "platforms=${platforms}"
          echo "artifact_name=${artifact_name}"
        } >> "$GITHUB_OUTPUT"

    - name: Build K3s binaries
      env:
        DOCKER_BUILD_SUMMARY: false
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        file: ./Dockerfile.local
        target: result
        build-args: |
          GIT_TAG=${{ steps.git_vars.outputs.git_tag }}
          TREE_STATE=${{ steps.git_vars.outputs.tree_state }}
          COMMIT=${{ steps.git_vars.outputs.commit }}
          DIRTY=${{ steps.git_vars.outputs.dirty }}
          GOCOVER=${{ inputs.test-coverage && '1' || '0' }}
        push: false
        provenance: mode=min
        platforms: ${{ steps.platforms.outputs.platforms }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=local,dest=.buildx-out

    - name: Collect build outputs
      run: |
        mkdir -p dist/artifacts build/out bin
        if [ -d .buildx-out/dist ]; then
          cp -a .buildx-out/. .
        else
          while IFS= read -r -d '' file; do cp -f "$file" dist/artifacts/; done < <(find .buildx-out -path '*/dist/artifacts/*' -type f -print0)
          while IFS= read -r -d '' file; do cp -f "$file" build/out/; done < <(find .buildx-out -path '*/build/out/data-*.tar.zst' -type f -print0)
          bin_k3s=$(find .buildx-out -path '*/bin/k3s' -type f | head -n 1)
          if [ -n "${bin_k3s}" ]; then
            install -m 0755 "${bin_k3s}" bin/k3s
          fi
        fi

    - name: Caculate binary checksum
      run: |
        for binary in dist/artifacts/k3s dist/artifacts/k3s-* dist/artifacts/k3s.exe; do
          [ -f "${binary}" ] || continue
          name=$(basename "${binary}")
          case "${name}" in
            k3s-armhf) checksum=k3s-arm.sha256sum ;;
            *) checksum=${name}.sha256sum ;;
          esac
          sha256sum "${binary}" | sed 's|dist/artifacts/||' > "dist/artifacts/${checksum}"
        done
    
    - name: Build K3s image
      if: inputs.upload-image == true && inputs.os == 'linux' && (inputs.arch == 'amd64' || inputs.arch == 'arm64')
      run: ./scripts/package-image
      
    - name: "Save K3s image"
      if: inputs.upload-image == true && inputs.os == 'linux'
      run: docker image save rancher/k3s -o ./dist/artifacts/k3s-image.tar

    - name: "Save K3s build"
      if: inputs.upload-build == true  && inputs.os == 'linux'
      run: |
        if [ -n '${{ inputs.platforms }}' ]; then
          cp ./build/out/data-linux-*.tar.zst ./dist/artifacts/
        else
          cp ./build/out/data-linux-${{ inputs.arch }}.tar.zst ./dist/artifacts/data-linux${{ env.ARCH_EXT }}.tar.zst
        fi

    # We use this version of the k3s binary to symlink to kubectl (and any other smylinks we need)
    - name: "Save bin k3s binary"
      if: inputs.os == 'linux'
      run: install -m 0755 ./bin/k3s ./dist/artifacts/bin-k3s

    - name: "Upload K3s Artifacts"
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ steps.platforms.outputs.artifact_name }}
        path: dist/artifacts/
